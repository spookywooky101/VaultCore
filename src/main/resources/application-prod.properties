# ─────────────────────────────────────────────────
# PRODUCTION PROFILE (used on Render.com)
# Activated by: SPRING_PROFILES_ACTIVE=prod
# All values come from Render environment variables
# ─────────────────────────────────────────────────

# PostgreSQL database (Neon.tech)
spring.datasource.url=${DATABASE_URL}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:}
spring.datasource.password=${DATABASE_PASSWORD:}

# JPA / Hibernate settings for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Disable H2 console in production
spring.h2.console.enabled=false

# JWT
cms.jwt.secret=${JWT_SECRET}
cms.jwt.expirationMs=86400000

# File Upload
file.upload-dir=uploads
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# CORS — your Vercel frontend URL
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
