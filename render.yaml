services:
  - type: web
    name: valutcore-backend
    runtime: java
    buildCommand: "./mvnw package -DskipTests"
    startCommand: "java -Dspring.profiles.active=prod -jar target/cms-0.0.1-SNAPSHOT.jar"
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        sync: false         # Set this in Render dashboard from Neon
      - key: JWT_SECRET
        generateValue: true # Render auto-generates a secure random value
      - key: CLOUDINARY_CLOUD_NAME
        sync: false         # Set in Render dashboard
      - key: CLOUDINARY_API_KEY
        sync: false         # Set in Render dashboard
      - key: CLOUDINARY_API_SECRET
        sync: false         # Set in Render dashboard
      - key: CORS_ALLOWED_ORIGINS
        sync: false         # Set to your Vercel frontend URL
